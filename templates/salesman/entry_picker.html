{% extends "salesman/_base.html" %}
{% load humanize %}

{% block title %}Naya Entry — Dukaan chunein{% endblock %}

{% block content %}
<div class="p-4">
    <h1 class="text-xl font-bold text-slate-900 mb-1">Naya Entry</h1>
    <p class="text-sm text-slate-500 mb-4">Kis dukaan ke liye?</p>

    {# Live HTMX search. #}
    <div class="mb-3">
        <input type="search" name="q" value="{{ search }}" placeholder="Dukaan dhundein…"
               class="w-full px-4 py-3 text-base border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
               autocomplete="off" autofocus
               hx-get="{% url 'core:entry_new_picker' %}"
               hx-trigger="keyup changed delay:300ms, search"
               hx-target="#picker-results"
               hx-push-url="true">
    </div>

    <div id="picker-results">
        {% include "salesman/_entry_picker_results.html" %}
    </div>
</div>
{% endblock %}
