{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex flex-col bg-slate-50">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="px-4 py-3 flex items-center justify-between max-w-md mx-auto">
            <div>
                <div class="text-[10px] uppercase tracking-wide text-slate-400">Salesman</div>
                <div class="text-sm font-bold text-slate-900">{{ user.full_name|default:user.username }}</div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="text-xs text-slate-500 hover:text-slate-700">Logout</button>
            </form>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
        <div class="max-w-md mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include "salesman/partials/_bottom_nav.html" %}
</div>
{% endblock %}
