{% extends "base.html" %}

{% block title %}Login — Ganpati Enterprises{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-sm w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-xl bg-red-500 flex items-center justify-center text-white text-2xl font-bold">G</div>
            <div>
                <h1 class="text-lg font-bold text-slate-900">Ganpati Enterprises</h1>
                <p class="text-xs text-slate-500">Login karein</p>
            </div>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            {% if form.errors %}
            <div class="rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
                Username ya password galat hai. Phir se try karein.
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" id="id_username" autocomplete="username" autofocus required
                    class="w-full px-3 py-3 text-base border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" required
                    class="w-full px-3 py-3 text-base border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
            </div>

            <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors text-base">
                Login
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
